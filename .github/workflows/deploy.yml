name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; queued runs wait rather than cancel
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        # PASSWORD_HASH is a GitHub Secret — injected into the bundle at build time.
        # It is never written to source code or the repo. Local builds without the
        # secret produce an open-access bundle (gate disabled).
        env:
          PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}
        run: npm run build

      # Stage only what the browser needs — skip src/, node_modules/, etc.
      - name: Prepare deploy directory
        run: |
          mkdir _site
          cp index.html _site/
          cp -r dist _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
